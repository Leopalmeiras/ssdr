<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM SDR | Origens</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body data-page="origens">
    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="content">
        <header class="page-header">
          <h1>Origens</h1>
          <p>Cadastre e personalize as origens de lead.</p>
        </header>

        <section class="card form-card">
          <form id="origemForm" class="inline-form" novalidate>
            <input type="hidden" id="origemId" />
            <input id="origemNome" type="text" required placeholder="Ex: Webinar" />
            <button type="submit" class="btn-primary">Salvar origem</button>
          </form>
          <p id="origemError" class="error-message"></p>
          <ul id="origensList" class="list-clean"></ul>
        </section>
      </main>
    </div>

    <script src="./script.js"></script>
  </body>
